<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FITONE ポスター</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
  }

  .poster {
    min-height: 100vh;
    padding: 32px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: linear-gradient(180deg, #111 0%, #1c1c1c 100%);
  }

  .top {
    text-align: center;
    margin-bottom: 24px;
  }

  .tag {
    display: inline-block;
    background: #00c300;
    color: #fff;
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 44px;
    margin: 0 0 10px;
    letter-spacing: 1px;
  }

  .sub {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 12px;
  }

  .lead {
    font-size: 18px;
    color: #ddd;
    line-height: 1.7;
  }

  .price-box {
    background: #fff;
    color: #111;
    border-radius: 18px;
    padding: 24px 20px;
    margin: 28px 0;
    text-align: center;
  }

  .campaign {
    font-size: 18px;
    font-weight: bold;
    color: #00a63e;
    margin-bottom: 10px;
  }

  .main-price {
    font-size: 42px;
    font-weight: bold;
    margin: 0;
  }

  .normal-price {
    font-size: 18px;
    margin-top: 10px;
  }

  .features {
    background: rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 28px;
  }

  .features h2 {
    margin-top: 0;
    font-size: 22px;
  }

  .features ul {
    margin: 0;
    padding-left: 20px;
    line-height: 1.9;
    font-size: 17px;
  }

  .access {
    background: rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 28px;
  }

  .access h2 {
    margin-top: 0;
    font-size: 22px;
  }

  .cta {
    text-align: center;
    background: #00c300;
    color: #fff;
    text-decoration: none;
    padding: 18px;
    border-radius: 14px;
    font-size: 22px;
    font-weight: bold;
    display: block;
  }

  .note {
    text-align: center;
    color: #ccc;
    font-size: 14px;
    margin-top: 12px;
  }
</style>
</head>
<body>
  <div class="poster">
    <div>
      <div class="top">
        <div class="tag">完全個室ジム</div>
        <h1>FITONE</h1>
        <div class="sub">人目が気になる人へ</div>
        <div class="lead">
          旭川の隠れ家的な自宅ジム。<br>
          落ち着いた空間で、自分のペースで始められます。
        </div>
      </div>

      <div class="price-box">
        <div class="campaign">オープン記念</div>
        <p class="main-price">初回体験 無料</p>
        <div class="normal-price">通常30分 2000円 / 4回券 6000円</div>
        <div class="normal-price">セルフ利用 1時間 2000円</div>
      </div>

      <div class="features">
        <h2>こんな人におすすめ</h2>
        <ul>
          <li>ジムで人の目が気になる</li>
          <li>落ち着いてトレーニングしたい</li>
          <li>何をすればいいかわからない</li>
          <li>まずは軽く始めたい</li>
        </ul>
      </div>

      <div class="access">
        <h2>アクセス</h2>
        <div>旭川市神居町雨紛380-68</div>
        <div style="margin-top:10px;">予約：LINE / DM / 電話</div>
      </div>
    </div>

    <div>
      <a class="cta" href="https://lin.ee/ここにLINE">LINEで予約する</a>
      <div class="note">初心者歓迎 / 完全予約制</div>
    </div>
  </div>
</body>
</html>
